id = "letter"
version = "0.1.0"
display_name = "Formal Letter"
description = "Formal letter template for professional correspondence"

[files]
include = ["**/*.tex", "**/*.bib"]
exclude = []

[[placeholders]]
name = "title"
type = "string"
description = "Letter subject line"
required = true

[[placeholders]]
name = "author"
type = "string"
description = "Sender name"
required = true
default = "{{user.name}}"

[[placeholders]]
name = "date"
type = "string"
description = "Letter date"
required = false
default = "\\today"

[[placeholders]]
name = "language"
type = "enum"
description = "Document language (for babel/polyglossia)"
required = true
choices = ["english", "spanish", "french", "german", "italian", "portuguese"]
default = "english"

[[post_generate]]
name = "install-packages"
description = "Install LaTeX packages if needed"
command = "texforge build"
optional = true

