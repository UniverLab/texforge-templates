id = "general"
version = "0.1.0"
display_name = "General Article"
description = "Plantilla mínima de artículo — documento genérico con estructura base"

[files]
include = ["**/*.tex", "**/*.bib"]
exclude = []

[[placeholders]]
name = "title"
type = "string"
description = "Título del documento"
required = true

[[placeholders]]
name = "author"
type = "string"
description = "Autor principal"
required = true
default = "{{user.name}}"

[[placeholders]]
name = "date"
type = "string"
description = "Fecha de publicación"
required = false
default = "\\today"

[[placeholders]]
name = "documentclass"
type = "string"
description = "Clase de documento LaTeX"
required = false
default = "article"

[[post_generate]]
name = "install-packages"
description = "Install LaTeX packages if needed"
command = "texforge build"
optional = true

