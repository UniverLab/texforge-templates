id = "general"
version = "0.1.0"
display_name = "General Article"
description = "A minimal, generic template for any LaTeX document"

[files]
include = ["**/*.tex", "**/*.bib"]
exclude = []

[[placeholders]]
name = "title"
type = "string"
description = "Document title"
required = true

[[placeholders]]
name = "author"
type = "string"
description = "Main author"
required = true
default = "{{user.name}}"

[[placeholders]]
name = "date"
type = "string"
description = "Publication date"
required = false
default = "\\today"

[[placeholders]]
name = "language"
type = "enum"
description = "Document language (for babel/polyglossia)"
required = true
choices = ["english", "spanish", "french", "german", "italian", "portuguese"]
default = "english"

[[post_generate]]
name = "install-packages"
description = "Install LaTeX packages if needed"
command = "texforge build"
optional = true

